name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install

      # Typecheck + build + lint with placeholder env (no DB needed at build).
      - name: Typecheck, build, lint
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          APP_BASE_DOMAIN: localhost:3000
        run: |
          npm run typecheck
          npm run build
          npm run lint --if-present

      # Real integration tests against a throwaway local Supabase (Postgres +
      # Auth + PostgREST) — protects RLS and the booking/sync invariants.
      # Local keys are the well-known public dev keys, not secrets.
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (applies migrations)
        run: supabase start

      - name: Integration tests
        run: |
          set -eo pipefail
          STATUS=$(supabase status -o json)
          echo "status keys: $(echo "$STATUS" | jq -c 'keys')"
          export NEXT_PUBLIC_SUPABASE_URL=$(echo "$STATUS" | jq -r '.API_URL')
          export NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')
          export SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')
          echo "URL=$NEXT_PUBLIC_SUPABASE_URL anon_len=${#NEXT_PUBLIC_SUPABASE_ANON_KEY} svc_len=${#SUPABASE_SERVICE_ROLE_KEY}"
          # Wait for PostgREST + assert migrations applied (organizations exists).
          code=000
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/organizations?select=id&limit=1")
            [ "$code" = "200" ] && break
            echo "waiting for PostgREST… ($code)"; sleep 2
          done
          [ "$code" = "200" ] || { echo "::error::organizations not reachable (HTTP $code)"; exit 1; }
          npm test

      - name: Stop local Supabase
        if: always()
        run: supabase stop
