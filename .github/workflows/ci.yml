name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install

      # Typecheck + build + lint with placeholder env (no DB needed at build).
      - name: Typecheck, build, lint
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          APP_BASE_DOMAIN: localhost:3000
        run: |
          npm run typecheck
          npm run build
          npm run lint --if-present

      # Real integration tests against a throwaway local Supabase (Postgres +
      # Auth + PostgREST) — protects RLS and the booking/sync invariants.
      # Local keys are the well-known public dev keys, not secrets.
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (applies migrations)
        run: supabase start

      - name: Integration tests
        run: |
          set -eo pipefail
          STATUS=$(supabase status -o json)
          export NEXT_PUBLIC_SUPABASE_URL=$(echo "$STATUS" | jq -r '.API_URL')
          export NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')
          export SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')
          echo "URL=$NEXT_PUBLIC_SUPABASE_URL"
          echo "svc role: $(echo "$SUPABASE_SERVICE_ROLE_KEY" | cut -d. -f2 | base64 -d 2>/dev/null | jq -r '.role' 2>/dev/null || echo '?')"
          echo "anon role: $(echo "$NEXT_PUBLIC_SUPABASE_ANON_KEY" | cut -d. -f2 | base64 -d 2>/dev/null | jq -r '.role' 2>/dev/null || echo '?')"
          npm test 2>&1 | tee /tmp/testout
          if grep -qE "# skipped [1-9]|ℹ skipped [1-9]" /tmp/testout; then
            echo "::error::integration tests were skipped (Supabase env not wired)"; exit 1
          fi

      - name: Stop local Supabase
        if: always()
        run: supabase stop
